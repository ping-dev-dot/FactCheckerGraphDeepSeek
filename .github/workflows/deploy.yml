name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Verify CF_AIG_TOKEN secret
        run: |
          if [ -z "${{ secrets.CF_AIG_TOKEN }}" ]; then
            echo "⚠️  CF_AIG_TOKEN secret is not set! Skipping deploy."
            exit 1
          fi
          echo "✅ CF_AIG_TOKEN secret is configured"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            CF_AIG_TOKEN
        env:
          CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}
